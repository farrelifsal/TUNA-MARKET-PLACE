<div class="container py-5">
  <h2 class="text-center mb-4">Your Cart</h2>
  <div id="cart-content"></div>
</div>

<div class="container-fluid text-center text-light fw-bold mt-4" style="background-color: rgb(81, 81, 81);">
  Grab Yours Now.
</div>

<footer class="bg-white py-4 border-top border-dark">
  <div class="container">
    <div class="row text-center align-items-center">
      <div class="col-md-3 mb-4">
        <img src="foto/logo.jpg" width="65">
      </div>
      <div class="col-md-3 mb-4">
        <h6 class="fw-bold">TUNA.</h6>
        <p class="mb-0">The Official Store of TUNA.</p>
      </div>
      <div class="col-md-3 mb-4">
        <h6 class="fw-bold">CONTACT US</h6>
        <a href="#" class="btn btn-dark d-inline-flex align-items-center gap-2">
          <i class="bi bi-whatsapp"></i>

      <div class="col-md-3 mb-4">

        <div class="d-flex justify-content-center gap-3">

    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
function renderCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if (cart.length === 0) {
    document.getElementById("cart-content").innerHTML =
      "<p class='text-center'>Your cart is empty. Let's go shopping!</p>";
    return;
  }

  let html = `<div class="row g-3">`;

  cart.forEach((item, index) => {
    let qty = item.qty || 1;
    let total = item.harga * qty;

    html += `
      <div class="col-12">
        <div class="card shadow-sm">
          <div class="card-body d-flex justify-content-between align-items-center">

            <div>
              <h5 class="card-title mb-2">${item.nama}</h5>
              <p class="mb-1"><strong>Harga:</strong> Rp${item.harga}</p>
              <p class="mb-1"><strong>Qty:</strong> ${qty}</p>
              <p class="mb-2"><strong>Total:</strong> Rp${total}</p>

              <div class="d-flex gap-2 mt-2">
                <button class="btn btn-dark btn-sm" onclick="checkoutItem(${index})">
                  Checkout
                </button>
                <button class="btn btn-dark btn-sm" onclick="removeItem(${index})">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>

            <img src="${item.gambar}" 
                 alt="${item.nama}" 
                 style="width: 90px; height: 90px; object-fit: contain">
          </div>
        </div>
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("cart-content").innerHTML = html;
}

function removeItem(index) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function checkoutItem(index) {
  let nomor = "6281317058179";

  window.open(`https://wa.me/${nomor}`, "_blank");
}

renderCart();
</script>
