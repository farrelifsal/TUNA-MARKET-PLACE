  <!--search logic-->
  <script>
    function handleSearch(event) {
      event.preventDefault();

      const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      const resultInfo = document.getElementById('resultInfo');

      const routes = [
        {
          page: 'shoes.html',
          keywords: ['shoe', 'shoes', 'sepatu', 'speedfish', 'sneakers', 'speedy', 'tuna signature sneakers', 'tuna signature speedy', 'tuna sneakers', 'tuna speedy', 'tuna shoes', 'tuna sepatu', 'tuna shoe', 'tuna sneakers 1', 'tuna sneakers 2', 'tuna sneakers 3', 'tuna speedy 1', 'tuna speedy 2', 'tuna speedy 3', 'sneakers 1', 'sneakers 2', 'sneakers 3', 'speedy 1', 'speedy 2', 'speedy 3', 'tuna signature sneakers 1', 'tuna signature sneakers 2', 'tuna signature sneakers 3', 'tuna signature speedy 1', 'tuna signature speedy 2', 'tuna signature speedy 3', 'tuna speedy 1', 'tuna speedy 2', 'tuna speedy 3', 'tuna sneakers 1', 'tuna sneakers 2', 'tuna sneakers 3', 'tuna shoes 1', 'tuna shoes 2', 'tuna shoes 3', 'tuna sepatu 1', 'tuna sepatu 2', 'tuna sepatu 3', 'sneakers 1', 'sneakers 2', 'sneakers 3', 'speedy 1', 'speedy 2', 'speedy 3', 'tuna signature sneakers 1', 'tuna signature sneakers 2', 'tuna signature sneakers 3', 'tuna signature speedy 1', 'tuna signature speedy 2', 'tuna signature speedy 3', 'tuna speedy 1', 'tuna speedy 2', 'tuna speedy 3', 'tuna sneakers 1', 'tuna sneakers 2', 'tuna sneakers 3', 'tuna shoes 1', 'tuna shoes 2', 'tuna shoes 3', 'tuna sepatu 1', 'tuna sepatu 2', 'tuna sepatu 3', 'sneakers 1', 'sneakers 2', 'sneakers 3', 'speedy 1', 'speedy 2', 'speedy 3', 'tuna signature sneakers 1', 'tuna signature sneakers 2', 'tuna signature sneakers 3', 'tuna signature speedy 1', 'tuna signature speedy 2', 'tuna signature speedy 3', 'tuna speedy 1', 'tuna speedy 2', 'tuna speedy 3', 'tuna sneakers 1', 'tuna sneakers 2', 'tuna sneakers 3', 'tuna shoes 1', 'tuna shoes 2', 'tuna shoes 3', 'tuna sepatu 1', 'tuna sepatu 2', 'tuna sepatu 3', 'sneakers 1', 'sneakers 2', 'sneakers 3', 'speedy 1', 'speedy 2', 'speedy 3', 'tuna signature sneakers 1', 'tuna signature sneakers 2', 'tuna signature sneakers 3', 'tuna signature speedy 1', 'tuna signature speedy 2', 'tuna signature speedy 3', 'tuna speedy 1', 'tuna speedy 2', 'tuna speedy 3', 'tuna sneakers 1', 'tuna sneakers 2', 'tuna sneakers 3', 'tuna shoes 1', 'tuna shoes 2', 'tuna shoes 3', 'tuna sepatu 1', 'tuna sepatu 2', 'tuna sepatu 3']
        },
        {
          page: 'shirt fix.html',
          keywords: ['shirt', 'shirts', 'baju', 'kaos', 'tuna signature shirt', 'tuna shirt', 'tuna baju', 'tuna kaos', 'tuna signature shirt 1', 'tuna signature shirt 2', 'tuna signature shirt 3', 'tuna shirt 1', 'tuna shirt 2', 'tuna shirt 3', 'tuna baju 1', 'tuna baju 2', 'tuna baju 3', 'tuna kaos 1', 'tuna kaos 2', 'tuna kaos 3', 'shirt 1', 'shirt 2', 'shirt 3' ]
        },
        {
          page: 'accesories fix.html',
          keywords: ['accessory', 'accessories', 'accesories', 'watch', 'shade', 'aksesoris', 'tuna signature watch', 'tuna watch', 'tuna shade', 'tuna aksesoris', 'tuna signature watch 1', 'tuna signature watch 2', 'tuna signature watch 3', 'tuna watch 1', 'tuna watch 2', 'tuna watch 3', 'tuna shade 1', 'tuna shade 2', 'tuna shade 3', 'tuna aksesoris 1', 'tuna aksesoris 2', 'tuna aksesoris 3', 'watch 1', 'watch 2', 'watch 3', 'shade 1', 'shade 2', 'shade 3', 'aksesoris 1', 'aksesoris 2', 'aksesoris 3'  ]
        }
      ];

      if (!keyword) {
        resultInfo.innerHTML = '<span class="text-danger">Tolong isi kata kunci dulu.</span>';
        return false;
      }

      for (const item of routes) {
        if (item.keywords.some(word => keyword.includes(word))) {
          resultInfo.innerHTML = `<span class="text-success">Redirecting to ${item.page}...</span>`;
          setTimeout(() => {
            window.location.href = item.page;
          }, 600);
          return false;
        }
      }

      resultInfo.innerHTML = '<span class="text-danger">Produk tidak ditemukan. Coba kata lain.</span>';
      return false;
    }
  </script>
